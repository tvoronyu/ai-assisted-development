services:
  postgres:
    image: postgres:17-alpine
    container_name: tickets-postgres
    environment:
      POSTGRES_USER: tickets
      POSTGRES_PASSWORD: tickets
      POSTGRES_DB: tickets
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets -d tickets"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tickets-app
    environment:
      DATABASE_URL: postgresql+asyncpg://tickets:tickets@postgres:5432/tickets
      LOG_LEVEL: INFO
      APP_ENV: production
      MAX_UPLOAD_SIZE_BYTES: 536870912
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status == 200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # One-shot test runner. Activate with profile to avoid running on `up`.
  #   docker compose --profile test run --rm tests
  tests:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      DATABASE_URL: postgresql+asyncpg://tickets:tickets@postgres:5432/tickets
      APP_ENV: test
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
